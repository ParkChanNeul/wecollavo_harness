<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WeCollavo Client Proposal</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #171717;
      --muted: #5f6368;
      --line: #d9dde3;
      --soft: #f5f7fa;
      --accent: #1f5eff;
      --accent-soft: #e8efff;
      --warn: #8a4b00;
      --warn-soft: #fff4df;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #ffffff;
      line-height: 1.65;
    }

    main {
      max-width: 1040px;
      margin: 0 auto;
      padding: 48px 24px 72px;
    }

    header {
      border-bottom: 1px solid var(--line);
      padding-bottom: 28px;
      margin-bottom: 32px;
    }

    .eyebrow {
      color: var(--accent);
      font-weight: 700;
      margin: 0 0 8px;
    }

    h1 {
      font-size: 36px;
      line-height: 1.18;
      margin: 0 0 16px;
    }

    h2 {
      font-size: 24px;
      line-height: 1.3;
      margin: 44px 0 14px;
      padding-top: 4px;
    }

    h3 {
      font-size: 18px;
      margin: 24px 0 8px;
    }

    p { margin: 0 0 14px; }

    .summary {
      font-size: 19px;
      color: #2b2f36;
      max-width: 820px;
    }

    .callout {
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 8px;
      padding: 18px;
      margin: 18px 0;
    }

    .decision {
      border-color: #b8c8ff;
      background: var(--accent-soft);
    }

    .warning {
      border-color: #f1c56e;
      background: var(--warn-soft);
      color: var(--warn);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0 24px;
      font-size: 15px;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }

    th { background: var(--soft); }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .next-action {
      border-top: 2px solid var(--ink);
      margin-top: 48px;
      padding-top: 24px;
    }

    @media (max-width: 760px) {
      main { padding: 32px 16px 56px; }
      h1 { font-size: 29px; }
      .grid { grid-template-columns: 1fr; }
      table { font-size: 14px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">WeCollavo Meeting Diagnosis</p>
      <h1><!-- CLIENT_NAME --> 제안 진단 프레젠테이션</h1>
      <p class="summary"><!-- ONE_SENTENCE_CONCLUSION --></p>
    </header>

    <section>
      <h2>1. 오늘의 결론</h2>
      <div class="callout decision">
        <p><!-- TODAY_CONCLUSION --></p>
      </div>
    </section>

    <section>
      <h2>2. 왜 이런 결론이 나왔는가</h2>
      <p><!-- RATIONALE --></p>
    </section>

    <section>
      <h2>3. 미팅 질문과 답변</h2>
      <table>
        <thead>
          <tr>
            <th>질문</th>
            <th>답변</th>
            <th>제안에 반영된 내용</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><!-- QUESTION --></td>
            <td><!-- ANSWER --></td>
            <td><!-- IMPACT --></td>
          </tr>
        </tbody>
      </table>
    </section>

    <section>
      <h2>4. 고객 상황 진단</h2>
      <div class="grid">
        <div class="callout">
          <h3>현재 상태</h3>
          <p><!-- CURRENT_STATE --></p>
        </div>
        <div class="callout">
          <h3>실제 병목</h3>
          <p><!-- REAL_BOTTLENECK --></p>
        </div>
      </div>
    </section>

    <section>
      <h2>5. 우선순위</h2>
      <ol>
        <li><!-- PRIORITY_1 --></li>
        <li><!-- PRIORITY_2 --></li>
        <li><!-- PRIORITY_3 --></li>
      </ol>
    </section>

    <section>
      <h2>6. 1차 착수 범위</h2>
      <p><!-- FIRST_PHASE_SCOPE --></p>
    </section>

    <section>
      <h2>7. 가격 분해표</h2>
      <table>
        <thead>
          <tr>
            <th>항목</th>
            <th>범위</th>
            <th>금액</th>
            <th>필요한 이유</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><!-- PRICE_ITEM --></td>
            <td><!-- PRICE_SCOPE --></td>
            <td><!-- PRICE_AMOUNT --></td>
            <td><!-- PRICE_REASON --></td>
          </tr>
        </tbody>
      </table>
    </section>

    <section>
      <h2>8. 추가비 발생 조건</h2>
      <div class="callout warning">
        <p><!-- ADDITIONAL_FEE_RULES --></p>
      </div>
    </section>

    <section>
      <h2>9. 필요한 자료</h2>
      <ul>
        <li><!-- REQUIRED_MATERIAL_1 --></li>
        <li><!-- REQUIRED_MATERIAL_2 --></li>
        <li><!-- REQUIRED_MATERIAL_3 --></li>
      </ul>
    </section>

    <section>
      <h2>10. 30일 실행 계획</h2>
      <table>
        <thead>
          <tr>
            <th>기간</th>
            <th>실행</th>
            <th>확인 기준</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><!-- PERIOD --></td>
            <td><!-- ACTION --></td>
            <td><!-- PROOF --></td>
          </tr>
        </tbody>
      </table>
    </section>

    <section class="next-action">
      <h2>11. 본 제작 제안</h2>
      <p><!-- PRODUCTION_PROPOSAL --></p>
    </section>
  </main>
</body>
</html>
